# ============================================================
#  deploy/nginx/nginx.conf
#  Global nginx configuration
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;   # إخفاء إصدار nginx من الـ headers

    # ── Gzip ─────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # ── Rate Limiting Zones ───────────────────────────────────
    # منطقة خاصة بـ /auth/login: 5 طلبات/دقيقة لكل IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # منطقة عامة للـ API: 120 طلب/دقيقة لكل IP
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=120r/m;

    limit_req_status 429;

    # ── WebSocket upgrade map (required for proxy_set_header Connection)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream ─────────────────────────────────────────────
    upstream quran_api {
        server api:8080;
        keepalive 32;
    }

    # ── Include virtual hosts ─────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}