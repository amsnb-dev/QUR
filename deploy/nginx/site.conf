# ============================================================
#  deploy/nginx/site.conf
#  Virtual host: HTTP redirect + HTTPS reverse proxy
#  استبدل YOUR_DOMAIN بالدومين الفعلي قبل النشر
# ============================================================

# ── HTTP: redirect كل شيء إلى HTTPS ─────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name YOUR_DOMAIN;

    # certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # healthcheck: يجيب مباشرة بدون redirect (يحتاجه nginx healthcheck في docker-compose)
    location = /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name YOUR_DOMAIN;

    # ── TLS (certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # ── Request Limits ─────────────────────────────────────
    client_max_body_size    2m;    # JSON bodies فقط — لا file uploads حالياً
    client_body_timeout     12s;
    client_header_timeout   12s;
    send_timeout            10s;

    # ── /auth/login: rate limit مشدّد ─────────────────────
    location = /auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass         http://quran_api;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── /health: بدون rate limit (للـ monitoring) ─────────
    location = /health {
        proxy_pass         http://quran_api;
        include            /etc/nginx/conf.d/proxy_params.conf;
        access_log         off;
    }

    # ── API العام: rate limit عام ──────────────────────────
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        # WebSocket support (للمستقبل)
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;

        proxy_pass          http://quran_api;
        include             /etc/nginx/conf.d/proxy_params.conf;
    }
}

# ── Proxy params مشترك ────────────────────────────────────────
# يُضمَّن من proxy_params.conf لتفادي التكرار
