version: "3.9"

# ============================================================
#  docker-compose.prod.yml — Production stack
#  Usage:
#    docker compose -f deploy/docker-compose.prod.yml \
#                   --env-file deploy/.env.prod up -d
# ============================================================

networks:
  # تواصل داخلي فقط — postgres غير مكشوف للخارج أبداً
  internal:
    driver: bridge

volumes:
  pgdata:
    name: quran_pgdata_prod

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quran_db_prod
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # ⚠️ لا ports — postgres غير مكشوف خارج الـ container network
    volumes:
      - pgdata:/var/lib/postgresql/data
      # مجلد خاص بالـ backups يُحدّد من الـ host
      - ${BACKUP_DIR:-/opt/quran/backups}:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 20s
    # قيود موارد
    deploy:
      resources:
        limits:
          memory: 512M

  # ── API ────────────────────────────────────────────────────
  api:
    image: ${API_IMAGE:-quran-api:latest}
    container_name: quran_api_prod
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:                 ${PORT:-8080}
      ENV:                  production
      DB_URL:               postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL_MIN:   ${JWT_ACCESS_TTL_MIN:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      MIGRATIONS_DIR:       /migrations
      RUN_MIGRATIONS:       ${RUN_MIGRATIONS:-false}
    volumes:
      # migrations read-only (mounted from repo root)
      - ../migrations:/migrations:ro
    # ⚠️ لا ports — الـ traffic يمر عبر nginx فقط
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:${PORT:-8080}/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Nginx ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: quran_nginx_prod
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      # TLS certificates (managed by certbot on the host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health | grep -q ok || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
    deploy:
      resources:
        limits:
          memory: 64M
